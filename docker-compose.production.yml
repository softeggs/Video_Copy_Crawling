services:
  backend-api:
    image: ${BACKEND_API_IMAGE}
    command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 8002
    env_file:
      - .env.production
    ports:
      - "${BACKEND_PUBLIC_PORT}:8002"
    volumes:
      - ${APP_DATA_ROOT}/data:/app/data
      - ${APP_DATA_ROOT}/downloads:/app/downloads
      - ${APP_DATA_ROOT}/outputs:/app/outputs
      - ${APP_DATA_ROOT}/logs:/app/logs
      - ${APP_DATA_ROOT}/cookies.txt:/app/cookies.txt:ro
    healthcheck:
      test: ["CMD", "python", "scripts/http_healthcheck.py", "http://127.0.0.1:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  db-scheduler:
    image: ${DB_SCHEDULER_IMAGE}
    command: python -m scripts.run_db_scheduler
    env_file:
      - .env.production
    depends_on:
      backend-api:
        condition: service_healthy
    volumes:
      - ${APP_DATA_ROOT}/data:/app/data
      - ${APP_DATA_ROOT}/downloads:/app/downloads
      - ${APP_DATA_ROOT}/outputs:/app/outputs
      - ${APP_DATA_ROOT}/logs:/app/logs
      - ${APP_DATA_ROOT}/cookies.txt:/app/cookies.txt:ro
    restart: unless-stopped

  web-console:
    image: ${WEB_CONSOLE_IMAGE}
    command: streamlit run web_main.py --server.port 8501 --server.address 0.0.0.0
    env_file:
      - .env.production
    depends_on:
      backend-api:
        condition: service_healthy
    volumes:
      - ${APP_DATA_ROOT}/data:/app/data
      - ${APP_DATA_ROOT}/downloads:/app/downloads
      - ${APP_DATA_ROOT}/outputs:/app/outputs
      - ${APP_DATA_ROOT}/logs:/app/logs
      - ${APP_DATA_ROOT}/cookies.txt:/app/cookies.txt:ro
    healthcheck:
      test: ["CMD", "python", "scripts/http_healthcheck.py", "http://127.0.0.1:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  debug-console:
    image: ${DEBUG_CONSOLE_IMAGE}
    command: streamlit run app.py --server.port 8502 --server.address 0.0.0.0
    env_file:
      - .env.production
    depends_on:
      backend-api:
        condition: service_healthy
    volumes:
      - ${APP_DATA_ROOT}/data:/app/data
      - ${APP_DATA_ROOT}/downloads:/app/downloads
      - ${APP_DATA_ROOT}/outputs:/app/outputs
      - ${APP_DATA_ROOT}/logs:/app/logs
      - ${APP_DATA_ROOT}/cookies.txt:/app/cookies.txt:ro
    healthcheck:
      test: ["CMD", "python", "scripts/http_healthcheck.py", "http://127.0.0.1:8502/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  reverse-proxy:
    image: ${REVERSE_PROXY_IMAGE}
    depends_on:
      web-console:
        condition: service_healthy
      debug-console:
        condition: service_healthy
    ports:
      - "${PUBLIC_WEB_PORT}:8080"
      - "${PUBLIC_DEBUG_PORT}:8081"
    volumes:
      - ${NGINX_CONF_PATH}:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
