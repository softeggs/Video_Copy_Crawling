services:
  backend-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: python -m uvicorn backend.main:app --host 0.0.0.0 --port 8002
    env_file:
      - .env.deploy
    ports:
      - "8002:8002"
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./cookies.txt:/app/cookies.txt:ro
    healthcheck:
      test: ["CMD", "python", "scripts/http_healthcheck.py", "http://127.0.0.1:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  db-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: python -m scripts.run_db_scheduler
    env_file:
      - .env.deploy
    depends_on:
      backend-api:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./cookies.txt:/app/cookies.txt:ro
    restart: unless-stopped

  web-console:
    build:
      context: .
      dockerfile: Dockerfile.web
    command: streamlit run web_main.py --server.port 8501 --server.address 0.0.0.0
    env_file:
      - .env.deploy
    depends_on:
      backend-api:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./cookies.txt:/app/cookies.txt:ro
    healthcheck:
      test: ["CMD", "python", "scripts/http_healthcheck.py", "http://127.0.0.1:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  debug-console:
    build:
      context: .
      dockerfile: Dockerfile.debug
    command: streamlit run app.py --server.port 8502 --server.address 0.0.0.0
    env_file:
      - .env.deploy
    depends_on:
      backend-api:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./downloads:/app/downloads
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./cookies.txt:/app/cookies.txt:ro
    healthcheck:
      test: ["CMD", "python", "scripts/http_healthcheck.py", "http://127.0.0.1:8502/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      web-console:
        condition: service_healthy
      debug-console:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
